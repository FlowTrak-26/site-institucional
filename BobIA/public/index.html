<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>BobIA</title>
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<div class="container">
			<div class="nav-container">
				<div class="nav-content">
					<button class="btn-nav" onclick="redirecionamentoIndex()">Home</button>
					<div class="titulo-nav">
						<p>BobIA</p>
					</div>
				</div>
			</div>
			<div class="main-container">
				<div class="main-content">
					<h1>Seja bem vindo, <span id="user_name">N3</span>!</h1>
					<div class="card">
						<div class="card-input">
							<textarea id="pergunta" type="text" placeholder="Digite a pergunta..."></textarea>
							<button onclick="gerarResposta()" class="btn-response">Gerar Resposta</button>
						</div>
						<div class="card-response">
							<div id="resposta"></div>
						</div>
					</div>
				</div>
			</div>
		</div>


		<script>

		async function gerarResposta() {
			const pergunta = document.getElementById('pergunta').value;

			const response = await fetch('/perguntar', {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json'
				},
				body: JSON.stringify({ pergunta })
			});

			const data = await response.json();

			resposta.style.display = 'block';
			document.getElementById('resposta').innerText = data.resultado;
		}

		</script>
	</body>
	<script>
		function redirecionamentoIndex(){
			window.location = "http://localhost:8080";
		}

</script>
</html>
