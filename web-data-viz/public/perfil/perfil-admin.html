<script src="../sessao.js"></script>
<script>

	function atribuirEmpresa() {
		var cpfVar = ipt_cpf.value
		var id_adminVar = sessionStorage.ID_EMPRESA

		console.log("ID_ADMIN" + id_adminVar)

		if (cpfVar == "") {
			console.log("Campo do CPF vazio!")
		}

		fetch("/usuarios/atribuirEmpresa", {
			method: "PUT",
			headers: {
				"Content-Type": "application/json",
			},
			body: JSON.stringify({
				cpfServer: cpfVar,
				idEmpresaServer: id_adminVar
			}),
		})
			.then(function (resposta) {
				console.log("resposta: ", resposta);
				if (resposta.ok) {
					console.log("ID atribuído com sucesso!...");
					// window.location = "./perfil-empresa.html";
				} else {
					throw "Houve um erro ao atribuir o ID!";
				}
			})
			.catch(function (resposta) {
				console.log(`#ERRO: ${resposta}`);
				// finalizarAguardar();
			});

		return false;
	}

	function pagina_empresa() {
		window.location.href = './perfil-empresa.html';
	}


	var nome = sessionStorage.NOME_USUARIO;
	var permissao = sessionStorage.PERMISSAO;

	user_permissao.innerHTML = permissao;
	user_name.innerHTML = nome;
	console.log(nome);
	console.log(permissao);

	function novaSessao() {
		limparSessao();
		window.location = "../main/login.html";
	}
</script>
