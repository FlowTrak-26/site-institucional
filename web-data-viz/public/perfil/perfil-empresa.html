<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Flowtrak</title>
		<link href="./css/nav-bar.css" rel="stylesheet">
		<link href="./css/perfil-empresa.css" rel="stylesheet">
	</head>
	<body>
		<div class="main-container">
			<div class="nav-container">
				<div class="nav-logo">
					<h1>Flow <span>Trak</span></h1>
					<img src="../assets/imgs/logo.png" alt="" />
				</div>
				<div class="nav-buttons">

					<div class="nav-link">
						<div class="nav-link-img">
							<img src="../assets/icon/nav-icon-home.png" alt="">
						</div>
						<div class="nav-link-txt">
							<a href="../index.html">Home</a>
						</div>
					</div>

					<div class="nav-link" >
						<div class="nav-link-img">
							<img src="../assets/icon/nav-icon-geral.png" alt="">
						</div>
						<div class="nav-link-txt">
							<a href="#">Geral</a>
						</div>
					</div>

					<div class="nav-link">
						<div class="nav-link-img">
							<img src="../assets/icon/nav-icon-especifico.png" alt="">
						</div>
						<div class="nav-link-txt">
							<a href="./dashboard-espc.html">Específica</a>
						</div>
					</div>

				</div>
				<div class="perfil-area">
					<div class="perfil-img">
						<img src="../assets/icon/nav-icon-perfil.png" alt="">
					</div>
					<div class="text-perfil-area">
						<div class="top-perfil">
							<p>OXXO LTDA</p>
						</div>
						<div class="bottom-perfil">
							<p>Admin</p>
							<img src="../assets/icon/nav-seta-baixo.png">
						</div>
					</div>
				</div>
			</div>

			<div class="main-content">
				<div class="banner-content">
					<img src="../assets/imgs/banner-perfil.png" alt="">
				</div>
				<div class="container-icon-perfil">
					<div class="btns-icons-perfil">
						<button class="btn-ativo" >informações sensiveis</button>
						<button class="btn-inativo" onclick="pagina_admin()">adicionar funcionarios</button>
					</div>
					<img src="../assets/icon/icon-perfil-main.png" alt="">
				</div>

				<!-- fazer o bagulho aq -->
				<div class="container-ipts-dados">
					<div class="container-ipts-left">
						<div class="content-ipts">
							<div class="ipt-alteracao">
								<p>Nome da empresa:</p>
								<input placeholder="Nome">
							</div>
							<div class="ipt-alteracao">
								<p>Email:</p>
								<input placeholder="Email">
							</div>
							<div class="ipt-alteracao">
								<p>Telefone:</p>
								<input placeholder="Telefone">
							</div>
							<div class="ipt-alteracao">
								<p>CNPJ:</p>
								<input placeholder="Cnpj">
							</div>
						</div>
							
					</div>
					<div class="container-ipts-right left-line">
						<div class="content-ipts direita">
							<div class="ipt-alteracao">
								<p>Senha:</p>
								<input placeholder="Senha">
							</div>
							<div class="ipt-alteracao">
								<p>Confirmar senha:</p>
								<input placeholder="Confirmar senha">
							</div>
						<button class="btn-salvar-empresa" onclick="">Salvar alterações</button>
						</div>
					</div>
					
				</div>
			</div>
		</div>
	</body>
	<script>
	function pagina_admin(){
		window.location.href = './perfil-admin.html';
	}
	</script>
</html>
