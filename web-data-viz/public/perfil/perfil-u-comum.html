<!DOCTYPE html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Flowtrak</title>
		<link href="./css/nav-bar.css" rel="stylesheet">
		<link href="./css/perfil-comum.css" rel="stylesheet">
	</head>
	<body>
		<div class="main-container">
			<div class="nav-container">
				<div class="nav-logo">
					<h1>Flow <span>Trak</span></h1>
					<img src="../assets/imgs/logo.png" alt="" />
				</div>
				<div class="nav-buttons">
					<div class="nav-link">
						<div class="nav-link-img">
							<img src="../assets/icon/nav-icon-home.png" alt="">
						</div>
						<div class="nav-link-txt">
							<a href="../index.html">Home</a>
						</div>
					</div>

						<div class="nav-link " >
							<div class="nav-link-img">
								<img src="../assets/icon/nav-icon-geral.png" alt="">
							</div>
							<div class="nav-link-txt">
								<a href="../dashboard/dash.html">Geral</a>
							</div>
						</div>

						<div class="nav-link">
							<div class="nav-link-img">
								<img src="../assets/icon/nav-icon-especifico.png" alt="">
							</div>
							<div class="nav-link-txt">
								<a href="../dashboard/dashboard-espc.html">Específica</a>
							</div>
						</div>

				</div>
				<div class="perfil-area">
					<div class="perfil-img">
						<button class="btn-pag-login" onclick="redirecionamento_perfil()">
							<img src="../assets/icon/nav-icon-perfil.png" alt="">
						</button>
					</div>
					<div class="text-perfil-area">
						<div class="top-perfil">
							<p id="user_name">Usuario</p>
						</div>
						<div class="bottom-perfil">
							<button class="btn-sair" onclick="limparSessao()">
								<p id="user_permissao">comum</p>
								<img src="../assets/icon/nav-seta-baixo.png">
							</button>
						</div>
					</div>
				</div>
			</div>

			<div class="main-content">
				<div class="banner-content">
					<img src="../assets/imgs/banner-perfil.png" alt="">
				</div>
				<div class="container-icon-perfil">
					<img src="../assets/icon/icon-perfil-main.png" alt="">
				</div>

				<div class="container-inputs">
					<div class="inputs-area">
						<div class="input-perfil">
							<p>Nome Completo:</p>
							<input placeholder="Nome">
						</div>
						<div class="input-perfil">
							<p>Email:</p>
							<input placeholder="Email">
						</div>
						<div class="input-perfil">
							<p>Telefone:</p>
							<input placeholder="Telefone">
						</div>
					</div>

					<div class="inputs-area area-border-left">
						<div class="input-perfil">
							<p>Senha:</p>
							<input placeholder="senha">
						</div>
						<div class="input-perfil">
							<p>Confirmar senha:</p>
							<input placeholder="confirme senha">
						</div>
						<button class="btn-salvar-alteracoes">Salvar Alterações</button>
					</div>
				</div>
			</div>


		</div>
	</body>
</html>
