<!DOCTYPE html>
<html lang="pt-br">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>©2026 FlowTrak - Login</title>

	<script src="../sessao.js"></script>
	<script src="../js/login.js	"></script>

	<link rel="stylesheet" href="./css/login.css">
	<link rel="icon" href="../assets/imgs/logo.png">
</head>

<body>
	<div class="alerta_erro">
		<div class="card_erro" id="cardErro">
			<p id="mensagem_erro"></p>
			<!-- <span id="mensagem_erro"></span> -->
		</div>
	</div>
	<div class="container-login">
		<div class="container-cor">
			<div class="navbar">
				<ul>
					<li>
						<a href="../index.html">
							<i class="fa-solid fa-angle-left"></i> Home
						</a>
					</li>
				</ul>
			</div>
			<div class="content-login">
				<div class="login">
					<div class="login-title">
						<h1>Logar</h1>
						<p>Estamos felizes com sua volta!</p>
					</div>
					<div class="login-inputs">
						<div class="inputs-row gap-row">
							<label for="ipt_email_login">E-mail:</label>
							<input type="text" id="email_input" placeholder="Digite seu e-mail">
						</div>
						<div class="inputs-row">
							<label for="ipt_senha_login">Senha:</label>
							<input type="password" id="senha_input" placeholder="Digite sua senha">
						</div>
						<div class="inputs-links">
							<div class="links-check">
								<label class="content-check">
									<input id="botao-check" type="checkbox" name="opcao">
									<span class="checkmark"></span>
									<span class="text-check">Continuar Conectado</span>
								</label>
							</div>
							<div class="links-senha">
								<a href="./esqueci_a_senha.html">Esqueci a senha</a>
							</div>
						</div>
					</div>
					<div class="login-button">
						<div class="button-row">
							<button onclick="entrar()">Entrar</button>
							<p>
								Não tem uma conta?
								<span>
									<a href="./cadastro.html">Cadastre-se</a>
								</span>
							</p>
						</div>
						<div class="button-row">
							<p class="empresa">© 2026 FlowTrak</p>
						</div>
					</div>
					<div id="div_aguardar" class="loading-div">
						<img src="../assets/circle-loading.gif" style="width: 100px;" id="loading-gif">
					</div>
				</div>
			</div>
		</div>
	</div>

	<div id="div_erros_login">
		
	</div>
</body>

</html>

<script>
	function entrar() {
		aguardar();

		var emailVar = email_input.value;
		var senhaVar = senha_input.value;

		if (emailVar == "" || senhaVar == "") {
			cardErro.style.display = "block"
			mensagem_erro.innerHTML = "Preencha todos os campos antes de enviar";
			finalizarAguardar();
			return false;
		}
		else {
			setInterval(sumirMensagem, 5000)
		}

		console.log("FORM LOGIN: ", emailVar);
		console.log("FORM SENHA: ", senhaVar);

		fetch("/usuarios/autenticar", {
			method: "POST",
			headers: {
				"Content-Type": "application/json"
			},
			body: JSON.stringify({
				emailServer: emailVar,
				senhaServer: senhaVar
			})
		}).then(function (resposta) {
			console.log("ESTOU NO THEN DO entrar()!")

			if (resposta.ok) {
				console.log(resposta);

				resposta.json().then(json => {
					console.log(json);
					console.log(JSON.stringify(json));
					sessionStorage.ID_USUARIO = json.id;
					sessionStorage.NOME_USUARIO = json.nome;
					sessionStorage.EMAIL_USUARIO = json.email;
					sessionStorage.ID_EMPRESA = json.idEmpresa;
					sessionStorage.PERMISSAO = json.nivel_acesso;
					// sessionStorage.AQUARIOS = JSON.stringify(json.aquarios)

					setTimeout(function () {
						window.location = "../index.html";
					}, 1000); // apenas para exibir o loading


					let loading = document.getElementById('div_loading')

					loading.classList.add('active');

				});

			} else {

				console.log("Houve um erro ao tentar realizar o login!");

				resposta.text().then(texto => {
					console.error(texto);
					finalizarAguardar(texto);
				});

				let loading = document.getElementById('div_loading')
				loading.classList.remove('active');

			}

		}).catch(function (erro) {
			console.log(erro);
		})

		return false;
	}

	function sumirMensagem() {
		cardErro.style.display = "none"
	}
</script>
